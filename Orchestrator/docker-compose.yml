version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: orchestrator-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build: .
    container_name: orchestrator-app
    ports:
      - '8080:8080'
    environment:
      PORT: '8080'
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
