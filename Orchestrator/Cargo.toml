[package]
name = "orchestrator"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
tracing = "0.1"
tracing-subscriber = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower = "0.4"
redis = { version = "0.25", features = ["aio", "tokio-comp", "connection-manager"] }
dotenv = "0.15"

[[bin]]
name = "orchestrator"
path = "src/main.rs"
