# docker-compose.yml
# Unified stack: Redis · Gatekeeper · Orchestrator · Broker · Dedicated Game Server
#
# Start everything:  docker compose up -d
# Client runs locally:  cargo run -p client

networks:
  game-net:
    driver: bridge
    name: game-net

volumes:
  redis-data:

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - game-net
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Gatekeeper ────────────────────────────────────────────────────────────
  # POST /login on :3000  — client sends credentials, receives server coordinates.
  gatekeeper:
    build:
      context: .
      dockerfile: gatekeeper/Dockerfile
    image: gatekeeper:latest
    networks:
      - game-net
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Orchestrator ──────────────────────────────────────────────────────────
  # HTTP API on :8081  — server-fleet management.
  # UDP heartbeat listener on :7000  — receives heartbeats from game servers.
  # QUIC server on :5000  — listens for shard updates from quadtree.
  # Docker socket mounted so the server spawner can create/stop game-server containers.
  orchestrator:
    build:
      context: .
      dockerfile: Orchestrator/Dockerfile
    image: orchestrator:latest
    networks:
      - game-net
    ports:
      - "8081:8081"
      - "7000:7000/udp"
      - "5000:5000/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT: "8081"
      ORCH_PORT: "7000"
      ORCHESTRATOR_QUIC_PORT: "5000"
      REDIS_URL: redis://redis:6379
      DS_BASE_PORT: "7777"
      HOT_SERVERS_MIN: "0"
      HEARTBEAT_TTL_SECONDS: "30"
      SCALER_INTERVAL_SECONDS: "5"
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Quadtree ──────────────────────────────────────────────────────────────
  # Spatial partitioning service that maintains dynamic shard layout.
  # Sends shard updates to orchestrator via QUIC on :5000.
  # Orchestrator listens and spawns/stops game servers based on shard layout.
  quadtree:
    build:
      context: .
      dockerfile: quadtree/Dockerfile
    image: quadtree:latest
    networks:
      - game-net
    environment:
      QUADTREE_WORLD_SIZE: "${QUADTREE_WORLD_SIZE}"
      QUADTREE_MAX_CAPACITY: "${QUADTREE_MAX_CAPACITY}"
      QUADTREE_MAX_DEPTH: "${QUADTREE_MAX_DEPTH}"
      QUADTREE_NEARBY_MARGIN: "${QUADTREE_NEARBY_MARGIN}"
      QUADTREE_LISTEN_PORT: "5000"
      QUADTREE_ORCHESTRATOR_HOST: "orchestrator"
      QUADTREE_ORCHESTRATOR_PORT: "5000"
      QUADTREE_BROKER_HOST: "broker"
      QUADTREE_BROKER_PORT: "7776"
      QUADTREE_ENTITY_ADD_INTERVAL_MS: "${QUADTREE_ENTITY_ADD_INTERVAL_MS}"
      QUADTREE_AREA_OF_INTEREST_RADIUS : "${QUADTREE_AREA_OF_INTEREST_RADIUS}"
      RUST_LOG: info
    depends_on:
      orchestrator:
        condition: service_started
    restart: unless-stopped

  pathing-service:
    build:
      context: .
      dockerfile: pathing_service/Dockerfile
    image: pathing-service:latest
    networks:
      - game-net
    environment:
      PATHING_SERVICE_LISTEN_PORT: "6000"
      PATHING_SERVICE_BROKER_HOST: "broker"
      PATHING_SERVICE_BROKER_PORT: "7776"
      RUST_LOG: info
    depends_on:
      broker:
        condition: service_started
    restart: unless-stopped


  # ── Broker ───────────────────────────────────────────────────────────────
  # QUIC/UDP broker on :7776  — relays pub/sub traffic for clients and shards.
  broker:
    build:
      context: .
      dockerfile: broker/Dockerfile
    image: broker:latest
    networks:
      - game-net
    ports:
      - "7776:7776/udp"
    environment:
      BROKER_PORT: "7776"
      BROKER_PUBLIC_IP: localhost
      RUST_LOG: info
    restart: unless-stopped

  game-server:
    build:
      context: .
      dockerfile: GameServer/Dockerfile
    image: game-server:latest
    deploy:
      replicas: 0